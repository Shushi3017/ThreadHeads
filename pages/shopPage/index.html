<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBTK MOD - Urban Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body class="bg-white text-zinc-900 selection:bg-black selection:text-white overflow-x-hidden">

    <!-- Search Overlay -->
    <div id="searchOverlay"
        class="fixed inset-x-0 top-0 z-[60] bg-white border-b border-zinc-100 shadow-xl opacity-0 pointer-events-none transition-all duration-300">
        <div class="max-w-4xl mx-auto px-6 py-6">
            <div class="relative flex items-center border-b border-zinc-300 pb-2">
                <i class="fa-solid fa-magnifying-glass text-lg text-zinc-400 mr-4"></i>
                <input type="text" id="searchInput" placeholder="Shirts, pants, bags..."
                    class="w-full text-base font-medium outline-none bg-transparent placeholder:text-zinc-300 tracking-tight">
                <button onclick="toggleSearch()" class="p-2 hover:bg-zinc-50 rounded-full transition-colors ml-4">
                    <i class="fa-solid fa-xmark text-lg text-zinc-400"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-40 bg-white/90 backdrop-blur-xl border-b border-zinc-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex-1">
                <div class="text-3xl font-black tracking-tighter cursor-pointer inline-block italic hover:scale-105 transition-transform"
                    onclick="filterCategory('All')">
                    DBTK
                </div>
            </div>

            <div class="hidden md:flex flex-[2] justify-center items-center gap-10">
                <button onclick="filterCategory('All')"
                    class="nav-link active font-extrabold text-[11px] uppercase tracking-[0.25em]"
                    data-cat="All">All</button>
                <button onclick="filterCategory('Hoodies')"
                    class="nav-link font-extrabold text-[11px] uppercase tracking-[0.25em]"
                    data-cat="Hoodies">Hoodies</button>
                <button onclick="filterCategory('Bags')"
                    class="nav-link font-extrabold text-[11px] uppercase tracking-[0.25em]"
                    data-cat="Bags">Bags</button>
                <button onclick="filterCategory('Watches')"
                    class="nav-link font-extrabold text-[11px] uppercase tracking-[0.25em]"
                    data-cat="Watches">Watches</button>
            </div>

            <div class="flex-1 flex items-center justify-end gap-3">
                <button onclick="toggleSearch()" class="p-2.5 hover:bg-zinc-50 rounded-full transition-all">
                    <i class="fa-solid fa-magnifying-glass text-lg"></i>
                </button>
                <button id="cartBtn" class="relative p-2.5 hover:bg-zinc-50 rounded-full transition-all">
                    <i class="fa-solid fa-cart-shopping text-lg"></i>
                    <span id="cartBadge"
                        class="absolute top-1.5 right-1.5 bg-black text-white text-[8px] font-black w-4 h-4 rounded-full flex items-center justify-center hidden ring-2 ring-white">0</span>
                </button>
                <div class="relative ml-2">
                    <button id="profileBtn"
                        class="w-10 h-10 rounded-full bg-zinc-100 border border-zinc-200 flex items-center justify-center overflow-hidden hover:border-black transition-all">
                        <i class="fa-solid fa-user text-zinc-400"></i>
                    </button>
                    <div id="profileDropdown"
                        class="hidden-state absolute right-0 mt-4 w-60 bg-white border border-zinc-100 shadow-[0_20px_50px_rgba(0,0,0,0.15)] z-50 rounded-2xl p-2">
                        <div class="px-4 py-4 border-b border-zinc-50 mb-1">
                            <span class="text-[9px] font-black text-zinc-400 uppercase tracking-widest block mb-1">login
                                as
                                As</span>
                            <p class="text-sm font-black italic tracking-tight" id="userName"></p>
                        </div>
                        <button onclick="window.location.href='../profilePage/index.html'"
                            class="w-full text-left px-4 py-3 text-xs font-bold hover:bg-zinc-50 rounded-xl flex items-center gap-3 transition-colors">
                            <i class="fa-solid fa-id-badge text-zinc-400"></i> My Profile
                        </button>
                        <button
                            class="w-full text-left px-4 py-3 text-xs font-bold hover:bg-zinc-50 rounded-xl flex items-center gap-3 transition-colors">
                            <i class="fa-solid fa-clock-rotate-left text-zinc-400"></i> Order History
                        </button>
                        <div class="mt-1 pt-1 border-t border-zinc-50">
                            <button
                                class="w-full text-left px-4 py-3 text-xs font-black text-red-500 hover:bg-red-50 rounded-xl flex items-center gap-3 transition-colors">
                                <i class="fa-solid fa-power-off"></i> Logout
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="md:hidden flex items-center gap-8 overflow-x-auto px-6 py-4 hide-scrollbar border-t border-zinc-50">
            <button onclick="filterCategory('All')"
                class="nav-link active font-extrabold text-[10px] uppercase tracking-[0.2em] whitespace-nowrap shrink-0"
                data-cat="All">All</button>
            <button onclick="filterCategory('Hoodies')"
                class="nav-link font-extrabold text-[10px] uppercase tracking-[0.2em] whitespace-nowrap shrink-0"
                data-cat="Hoodies">Hoodies</button>
            <button onclick="filterCategory('Bags')"
                class="nav-link font-extrabold text-[10px] uppercase tracking-[0.2em] whitespace-nowrap shrink-0"
                data-cat="Bags">Bags</button>
            <button onclick="filterCategory('Watches')"
                class="nav-link font-extrabold text-[10px] uppercase tracking-[0.2em] whitespace-nowrap shrink-0"
                data-cat="Watches">Watches</button>
        </div>
    </nav>

    <div class="pt-32 md:pt-20">
        <div id="shopPage" class="page-content">
            <main class="max-w-7xl mx-auto px-6 py-16">
                <header
                    class="flex flex-col md:flex-row md:items-end justify-between mb-16 gap-6 border-b border-zinc-50 pb-8">
                    <div>
                        <h1 id="pageHeading" class="text-6xl font-black mb-3 uppercase tracking-tighter italic">All
                            Items</h1>
                        <p id="itemCount" class="text-zinc-400 text-xs font-bold uppercase tracking-[0.2em]">0 items
                            available</p>
                    </div>
                </header>
                <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-8 gap-y-12"></div>
            </main>
        </div>

        <!-- CART PAGE -->
        <div id="cartPage" class="page-content hidden min-h-screen bg-white">
            <div class="max-w-5xl mx-auto px-6 py-20">
                <div class="flex items-center gap-4 mb-16">
                    <h1 class="text-5xl font-black uppercase tracking-tighter italic">Shopping Bag</h1>
                    <span id="cartCountTitle" class="bg-zinc-100 px-4 py-1.5 rounded-full text-sm font-black">0</span>
                </div>
                <div id="cartList" class="divide-y divide-zinc-100 border-t border-zinc-100"></div>
                <div class="mt-12 p-8 bg-zinc-50 rounded-3xl">
                    <div class="flex flex-col md:flex-row justify-between items-center gap-10">
                        <div>
                            <p class="text-xs font-bold text-zinc-400 uppercase tracking-widest mb-2">Estimated Total
                            </p>
                            <h2 id="cartSubtotal" class="text-4xl font-black italic tracking-tighter">₱0.00</h2>
                        </div>
                        <div class="flex gap-4 w-full md:w-auto">
                            <button onclick="showPage('shop')"
                                class="flex-1 md:flex-none border-2 border-zinc-200 px-10 py-5 font-black uppercase text-[11px] tracking-widest hover:border-black transition-all rounded-2xl">Back
                                to Shop</button>
                            <button
                                class="flex-1 md:flex-none bg-black text-white px-12 py-5 font-black uppercase text-[11px] tracking-widest hover:bg-zinc-800 transition-all rounded-2xl shadow-xl">Checkout</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Product Detail Modal -->
    <div id="modalOverlay"
        class="fixed inset-0 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300 bg-white p-6 overflow-y-auto">
        <div id="modalContent" class="w-full max-w-6xl relative translate-y-12 transition-all duration-500 ease-out">
            <button id="closeModal"
                class="absolute top-0 right-0 p-4 hover:bg-zinc-100 rounded-full transition-colors z-50">
                <i class="fa-solid fa-xmark text-2xl"></i>
            </button>

            <div class="flex flex-col md:flex-row gap-12 items-center">
                <!-- Image Side - Now centered using justify-center and items-center -->
                <div
                    class="w-full md:w-1/2 bg-zinc-50 rounded-[32px] p-12 flex items-center justify-center min-h-[400px] lg:min-h-[600px]">
                    <img id="modalImg" src="" class="w-full max-w-md h-auto object-contain drop-shadow-2xl mx-auto">
                </div>

                <!-- Details Side -->
                <div class="w-full md:w-1/2 px-4 md:px-12 flex flex-col justify-center">
                    <h2 id="modalTitle"
                        class="text-4xl font-black mb-2 uppercase tracking-tighter italic leading-tight"></h2>
                    <p id="modalPrice" class="text-2xl font-black text-zinc-400 mb-10 tracking-tight"></p>

                    <div class="space-y-12">
                        <!-- Select Size -->
                        <div>
                            <label
                                class="text-[10px] font-black text-zinc-300 mb-6 block uppercase tracking-[0.3em]">Select
                                Size</label>
                            <div class="flex gap-4">
                                <label class="flex-1 cursor-pointer size-label">
                                    <input type="radio" name="size" value="S" class="hidden" checked>
                                    <span
                                        class="block py-3 border-2 border-zinc-100 rounded-full text-center font-bold text-xs hover:border-black transition-all uppercase">S</span>
                                </label>
                                <label class="flex-1 cursor-pointer size-label">
                                    <input type="radio" name="size" value="M" class="hidden">
                                    <span
                                        class="block py-3 border-2 border-zinc-100 rounded-full text-center font-bold text-xs hover:border-black transition-all uppercase">M</span>
                                </label>
                                <label class="flex-1 cursor-pointer size-label">
                                    <input type="radio" name="size" value="L" class="hidden">
                                    <span
                                        class="block py-3 border-2 border-zinc-100 rounded-full text-center font-bold text-xs hover:border-black transition-all uppercase">L</span>
                                </label>
                                <label class="flex-1 cursor-pointer size-label">
                                    <input type="radio" name="size" value="XL" class="hidden">
                                    <span
                                        class="block py-3 border-2 border-zinc-100 rounded-full text-center font-bold text-xs hover:border-black transition-all uppercase">XL</span>
                                </label>
                            </div>
                        </div>

                        <!-- Quantity -->
                        <div>
                            <label
                                class="text-[10px] font-black text-zinc-300 mb-6 block uppercase tracking-[0.3em]">Quantity</label>
                            <div class="flex items-center gap-10">
                                <label class="custom-option">
                                    <input type="radio" name="qty" value="1" class="hidden" checked
                                        onclick="toggleOthers(false)">
                                    <span class="radio-btn"></span>
                                    <span class="option-label">1</span>
                                </label>
                                <label class="custom-option">
                                    <input type="radio" name="qty" value="2" class="hidden"
                                        onclick="toggleOthers(false)">
                                    <span class="radio-btn"></span>
                                    <span class="option-label">2</span>
                                </label>
                                <label class="custom-option">
                                    <input type="radio" name="qty" value="3" class="hidden"
                                        onclick="toggleOthers(false)">
                                    <span class="radio-btn"></span>
                                    <span class="option-label">3</span>
                                </label>
                                <label class="custom-option">
                                    <input type="radio" name="qty" value="4" class="hidden"
                                        onclick="toggleOthers(false)">
                                    <span class="radio-btn"></span>
                                    <span class="option-label">4</span>
                                </label>
                                <label class="custom-option">
                                    <input type="radio" name="qty" value="Others" class="hidden"
                                        onclick="toggleOthers(true)">
                                    <span class="radio-btn"></span>
                                    <span class="option-label">Others</span>
                                </label>
                            </div>

                            <div id="customQtyWrapper">
                                <div class="flex flex-col gap-2">
                                    <label class="text-[10px] font-bold text-zinc-400 italic">How many quantity you
                                        need?</label>
                                    <input type="number" id="customQtyInput" placeholder="Type here" min="1"
                                        class="w-32 bg-zinc-50 border-2 border-zinc-100 rounded-2xl px-4 py-3 text-sm font-black focus:border-black outline-none transition-all">
                                </div>
                            </div>
                        </div>

                        <button id="addToCartBtn"
                            class="w-full bg-black text-white py-6 rounded-3xl font-black uppercase tracking-[0.25em] text-[12px] hover:bg-zinc-800 transition-all shadow-2xl active:scale-[0.98] italic">
                            Add to Bag
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
</body>

</html>
