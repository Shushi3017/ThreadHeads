<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Minimalist</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-white font-sans text-gray-900">

    <div class="min-h-screen flex flex-col items-center justify-center px-4 py-12">

        <!-- Login Section -->
        <div class="w-full max-w-[340px]">
            <h1 class="text-3xl font-bold text-center mb-10 tracking-tight">Login</h1>

            <form class="space-y-5" id="loginForm">
                <!-- Email Field -->
                <div class="group">
                    <label
                        class="block text-gray-400 text-xs font-medium mb-1 ml-1 transition-colors duration-300 group-focus-within:text-black">Email</label>
                    <input id="emailInput" type="email" placeholder="dltb@gmail.com"
                        class="w-full border border-gray-200 px-3 py-3 text-sm outline-none transition-all duration-300 focus:border-black focus:-translate-y-px placeholder:text-gray-900 placeholder:transition-opacity placeholder:duration-300 focus:placeholder:opacity-0"
                        required />
                </div>

                <!-- Password Field -->
                <div class="group">
                    <label
                        class="block text-gray-400 text-xs font-medium mb-1 ml-1 transition-colors duration-300 group-focus-within:text-black">Password</label>
                    <div class="relative flex items-center">
                        <input id="passwordInput" type="password" placeholder="••••••••••••"
                            class="w-full border border-gray-200 px-3 py-3 text-sm outline-none transition-all duration-300 focus:border-black focus:-translate-y-px placeholder:transition-opacity placeholder:duration-300 focus:placeholder:opacity-0"
                            required />
                        <button type="button" id="togglePassword"
                            class="absolute right-3 text-gray-400 hover:text-black transition-colors cursor-pointer focus:outline-none">
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <!-- Eye path with slash for hidden state -->
                                <path id="eyePath"
                                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                                </path>
                                <line id="eyeSlash" x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Error Message -->
                <p id="errorMessage" class="text-red-500 text-xs mt-2 hidden">
                    Incorrect email or password.
                </p>

                <!-- Action Buttons -->
                <div class="pt-4 space-y-4">
                    <button type="submit" id="loginBtn"
                        class="w-full bg-black text-white py-3 text-sm font-medium transition-all hover:opacity-90 active:scale-95">
                        Login
                    </button>

                    <div class="flex flex-col items-center space-y-3 text-sm font-medium pt-2">
                        <a href="./pages/signup/index.html"
                            class="hover:text-gray-400 transition-colors duration-200">Sign Up</a>
                        <a href="#" class="hover:text-gray-400 transition-colors duration-200">Recover Password</a>
                    </div>
                </div>
            </form>
        </div>

        <!-- Newsletter Section -->
        <div class="w-full max-w-[400px] mt-32 text-center">
            <h2 class="text-3xl font-bold tracking-tight">Newsletter</h2>
            <p class="text-gray-500 text-xs mt-2 font-medium">Let's keep in touch</p>

            <div class="mt-10 relative flex items-center border-b border-black pb-2">
                <span class="mr-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="20" height="16" x="2" y="4" rx="2" />
                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                    </svg>
                </span>
                <input type="email" placeholder="email@website.com"
                    class="w-full bg-transparent text-sm outline-none placeholder-gray-400 transition-all focus:placeholder:opacity-0" />
                <button class="ml-2 transition-transform duration-200 hover:translate-x-1 cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m9 18 6-6-6-6" />
                    </svg>
                </button>
            </div>
        </div>

    </div>

    <script src="./assets/js/script.js"></script>
</body>

</html>
